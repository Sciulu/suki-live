<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>主播名录 · suki.live</title>
  <link rel="stylesheet" href="/assets/css/site.css" />
  <script src="/assets/js/registry.js" defer></script>
</head>

<body class="registry-page">
  <nav class="navbar">
    <div class="nav-content">
      <a href="/" class="nav-logo">suki.live</a>
      <div class="nav-links">
        <a href="/" class="nav-link">首页</a>
        <a href="/registry.html" class="nav-link active">主播名录</a>
        <a href="https://github.com/vtuber-toolkit/suki-live" class="nav-link" target="_blank" rel="noopener">仓库</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <header>
      <h1>主播名录</h1>
      <p class="subtitle">这里列出当前注册在 suki.live 上的主播页面。你可以按名称或签名搜索，也可以直接进入对应子域名页面。</p>

      <div class="stats">
        <div class="stat-item">
          <div class="stat-num" id="total-count">-</div>
          <div class="stat-label">注册主播</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" id="active-count">-</div>
          <div class="stat-label">活跃中</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" id="updated-date">-</div>
          <div class="stat-label">最后更新</div>
        </div>
      </div>

      <div class="search-box">
        <input type="text" class="search-input" id="search-input" placeholder="搜索主播名称或签名" />
      </div>
    </header>

    <div id="vtuber-list" class="vtuber-grid">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>正在加载主播名录</p>
      </div>
    </div>

    <footer>
      <p><a href="/">返回首页</a> · <a href="https://github.com/vtuber-toolkit/suki-live" target="_blank" rel="noopener">查看仓库</a> · <a href="https://dreamail.cn/" target="_blank" rel="noopener">Dreamail 指引</a></p>
      <p>Copyright 2026 suki.live</p>
    </footer>
  </main>
</body>

</html>
