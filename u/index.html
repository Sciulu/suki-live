<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">加载中… · suki.live</title>
  <link rel="icon" type="image/x-icon" href="./favicon.ico" onerror="this.remove()" />
  <link rel="stylesheet" href="/assets/css/template.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
</head>

<body>
  <div class="header">
    <img id="avatar" class="avatar" src="./avatar.png" alt="avatar" onerror="this.style.display='none'" />
    <div id="name" class="name">加载中…</div>
    <div id="tagline" class="tagline"></div>

    <div id="social" class="social-links"></div>
  </div>

  <div class="container">
    <nav id="main-nav" class="nav-bar" style="display:none;">
      <a href="#section-playlist" class="nav-link" data-target="playlist" onclick="switchSection('playlist'); return false;">歌单</a>
      <a href="#section-bio" class="nav-link active" data-target="bio" onclick="switchSection('bio'); return false;">简介</a>
    </nav>
    <div id="content">
      <div class="loading">正在加载主播信息…</div>
    </div>
  </div>

  <p class="footer-note">
    托管于 <a href="https://github.com/vtuber-toolkit/suki-live" target="_blank" rel="noopener">vtuber-toolkit/suki-live</a> ·
    <a href="https://suki.live">返回首页</a> ·
    <a href="https://suki.live/registry.html">主播名录</a> ·
    <a href="https://dreamail.cn/" target="_blank" rel="noopener">匿名信</a> ·
    <a href="https://afdian.com/a/NatsukoYamamura" target="_blank" rel="noopener">爱发电</a>
  </p>

  <div id="random-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <h3>随机选歌</h3>
      <img id="modal-song-cover" class="modal-song-cover" src="" alt="" onerror="this.style.display='none'" />
      <p class="modal-song-title" id="modal-song-title">歌曲名称</p>
      <div class="modal-song-info" id="modal-song-info">
        <p id="modal-song-artist"></p>
        <p id="modal-song-meta"></p>
        <p id="modal-song-access"></p>
        <p id="modal-song-note" class="modal-song-note"></p>
      </div>
      <div class="modal-buttons">
        <button class="modal-btn modal-btn-cancel" onclick="closeModal()">关闭</button>
        <button class="modal-btn modal-btn-copy" onclick="copyRandomSong()">复制</button>
        <button class="modal-btn modal-btn-play" onclick="playSelected()">播放</button>
      </div>
    </div>
  </div>

  <script src="/assets/js/template/utils.js" defer></script>
  <script src="/assets/js/template/loaders.js" defer></script>
  <script src="/assets/js/template/playlist.js" defer></script>
  <script src="/assets/js/template/backgrounds.js" defer></script>
  <script src="/assets/js/template/bili.js" defer></script>
  <script src="/assets/js/template/render.js" defer></script>
  <script src="/assets/js/template/bootstrap.js" defer></script>
</body>

</html>
